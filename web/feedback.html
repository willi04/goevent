<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>GoEvent</title>
    <link rel="icon" type="image/png" href="icons/favicon.png" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#00502c" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#00502c",
              "primary-container": "#006b3c",
              surface: "#f9f9f9",
              "on-surface": "#1a1c1c",
            },
            fontFamily: { headline: ["Plus Jakarta Sans"], body: ["Manrope"] },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
    </style>
  </head>
  <body
    class="bg-surface font-body text-on-surface antialiased flex flex-col min-h-screen"
  >
    <div id="navbar"></div>
    <main
      class="max-w-3xl mx-auto px-6 pt-[96px] md:pt-[120px] pb-16 flex-1 w-full"
    >
      <div class="text-center mb-10">
        <div
          class="w-16 h-16 bg-primary/10 text-primary rounded-full flex items-center justify-center mx-auto mb-4"
        >
          <span class="material-symbols-outlined text-3xl">forum</span>
        </div>
        <h1
          class="text-3xl md:text-4xl font-black font-headline text-gray-900 tracking-tight mb-3"
        >
          Votre avis compte
        </h1>
        <p class="text-gray-500 font-medium">
          Aidez-nous à faire de GoEvent la meilleure plateforme de Centrafrique.
        </p>
      </div>

      <div
        class="bg-white rounded-[2rem] p-8 md:p-10 shadow-sm border border-gray-100 mb-8 flex flex-col items-center transition-all hover:shadow-md"
      >
        <h2 class="text-lg font-extrabold font-headline mb-6 text-gray-900">
          Comment évaluez-vous votre expérience ?
        </h2>

        <div
          class="flex items-center justify-center gap-2 mb-3"
          id="star-container"
        >
          <span
            onclick="setStar(1)"
            class="star material-symbols-outlined text-gray-300 text-5xl cursor-pointer transition-transform hover:scale-110 select-none"
            >star</span
          >
          <span
            onclick="setStar(2)"
            class="star material-symbols-outlined text-gray-300 text-5xl cursor-pointer transition-transform hover:scale-110 select-none"
            >star</span
          >
          <span
            onclick="setStar(3)"
            class="star material-symbols-outlined text-gray-300 text-5xl cursor-pointer transition-transform hover:scale-110 select-none"
            >star</span
          >
          <span
            onclick="setStar(4)"
            class="star material-symbols-outlined text-gray-300 text-5xl cursor-pointer transition-transform hover:scale-110 select-none"
            >star</span
          >
          <span
            onclick="setStar(5)"
            class="star material-symbols-outlined text-gray-300 text-5xl cursor-pointer transition-transform hover:scale-110 select-none"
            >star</span
          >
        </div>
        <p
          id="star-label"
          class="text-center text-gray-400 font-bold uppercase tracking-widest text-[11px]"
        >
          Cliquez sur les étoiles pour noter
        </p>
      </div>

      <div
        class="bg-white rounded-[2rem] p-8 md:p-10 shadow-sm border border-gray-100 mb-12"
      >
        <h2 class="text-xl font-extrabold font-headline mb-6 text-gray-900">
          Laissez-nous un message
        </h2>
        <div class="space-y-6">
          <div>
            <label
              class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2"
              >Catégorie</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"
                >category</span
              >
              <select
                id="fb-cat"
                class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors font-medium text-gray-900 appearance-none outline-none"
              >
                <option>Suggestion d'amélioration</option>
                <option>Bug / Erreur technique</option>
                <option>Félicitations</option>
                <option>Problème de paiement Orange Money</option>
                <option>Autre</option>
              </select>
              <span
                class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"
                >expand_more</span
              >
            </div>
          </div>

          <div>
            <label
              class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2"
              >Votre message <span class="text-red-500">*</span></label
            >
            <textarea
              id="fb-msg"
              rows="5"
              class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors font-medium text-gray-900 outline-none"
              placeholder="Décrivez votre expérience en détail..."
            ></textarea>
          </div>

          <div>
            <label
              class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2"
              >Email (Optionnel)</label
            >
            <div class="relative">
              <span
                class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"
                >mail</span
              >
              <input
                id="fb-email"
                type="email"
                class="w-full bg-gray-50 border border-gray-200 rounded-xl pl-12 pr-4 py-3.5 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors font-medium text-gray-900 outline-none"
                placeholder="Pour que nous puissions vous répondre"
              />
            </div>
          </div>

          <button
            onclick="submitFeedback()"
            class="w-full mt-4 py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-95 transition-all flex items-center justify-center gap-2"
          >
            Envoyer mon feedback
            <span class="material-symbols-outlined text-lg">send</span>
          </button>
        </div>
      </div>

      <div>
        <h2 class="text-2xl font-black font-headline mb-6 text-gray-900">
          Avis de la communauté
        </h2>
        <div id="community-feedbacks" class="space-y-4">
          <!-- Skeleton de chargement -->
          <div
            class="bg-white rounded-2xl p-5 border border-gray-100 animate-pulse"
          >
            <div class="flex gap-4">
              <div class="w-10 h-10 bg-gray-200 rounded-full shrink-0"></div>
              <div class="flex-1 space-y-2">
                <div class="h-4 bg-gray-200 rounded w-32"></div>
                <div class="h-3 bg-gray-100 rounded w-full"></div>
                <div class="h-3 bg-gray-100 rounded w-3/4"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="footer"></div>
    <div id="footer"></div>
    <script src="bt-api.js"></script>
    <script src="pwa.js"></script>
    <script>
      // 1. Injection de la navigation
      document.getElementById("navbar").innerHTML = btNavbar();
      document.getElementById("footer").innerHTML = btFooter();

      // 2. La logique des étoiles (Adaptée à TON code)
      var selectedStar = 0;
      var labels = [
        "",
        "Très mauvais",
        "Mauvais",
        "Moyen",
        "Bien",
        "Excellent !",
      ];

      // Cette fonction est appelée quand on clique sur une étoile dans ton HTML
      function setStar(n) {
        selectedStar = n;

        // On met à jour toutes les balises qui ont la classe "star"
        document.querySelectorAll(".star").forEach(function (s, i) {
          s.textContent = "star"; // Utilise l'icône Google
          s.classList.add("material-symbols-outlined");

          // Le style : taille, curseur, couleur et remplissage
          s.style.fontSize = "40px";
          s.style.cursor = "pointer";
          s.style.fontVariationSettings = i < n ? "'FILL' 1" : "'FILL' 0";
          s.style.color = i < n ? "#f59e0b" : "#e5e7eb"; // Jaune si actif, gris sinon
          s.style.transform = i < n ? "scale(1.1)" : "scale(1)";
          s.style.transition = "transform 0.1s ease";
        });

        // On met à jour le texte en dessous (Mauvais, Bien, Excellent...)
        var labelEl = document.getElementById("star-label");
        if (labelEl) {
          labelEl.textContent = labels[n] || "";
          labelEl.style.color =
            n >= 4 ? "#00502c" : n >= 3 ? "#f59e0b" : "#dc2626";
        }
      }

      // 3. Au chargement de la page, on affiche les étoiles à 0 (toutes vides)
      document.addEventListener("DOMContentLoaded", function () {
        setStar(0);
      });
      // 🔥 Soumission réelle à l'API
      async function submitFeedback() {
        var msg = document.getElementById("fb-msg").value.trim();
        var cat = document.getElementById("fb-cat").value;
        var email = document.getElementById("fb-email").value.trim();

        if (!msg) {
          btToast("Écrivez votre message", "error");
          return;
        }
        if (msg.length < 5) {
          btToast("Votre message est trop court (min 5 caractères)", "error");
          return;
        }
        if (email && !email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) {
          btToast("L'email semble invalide", "error");
          return;
        }

        try {
          await btApi.post("/feedback", {
            rating: selectedStar > 0 ? selectedStar : null,
            category: cat,
            message: msg,
            email_contact: email || null,
            page_origin: "feedback.html",
          });

          btToast(
            "Merci pour votre feedback" +
              (selectedStar > 0 ? " " + "⭐".repeat(selectedStar) : "") +
              " Nous vous lisons !",
            "success",
          );

          // Reset du formulaire
          document.getElementById("fb-msg").value = "";
          document.getElementById("fb-email").value = "";
          document.getElementById("fb-cat").value = "Suggestion d'amélioration";
          setStar(0);

          // Recharger les avis communauté (au cas où le nouveau feedback ait 4+ étoiles)
          loadCommunityFeedbacks();
        } catch (error) {
          console.error("Erreur feedback :", error);
          btToast(error.message || "Erreur lors de l'envoi", "error");
        }
      }

      // ── Charger les avis communauté ──────────────────────
      async function loadCommunityFeedbacks() {
        var container = document.getElementById("community-feedbacks");
        try {
          var feedbacks = await btApi.get("/feedback/community?limit=5");

          if (!feedbacks || feedbacks.length === 0) {
            container.innerHTML = `
              <div class="bg-white rounded-2xl p-6 border border-gray-100 text-center">
                <span class="material-symbols-outlined text-4xl text-gray-300 mb-2">forum</span>
                <p class="text-gray-500 font-medium">Soyez le premier à donner votre avis !</p>
                <p class="text-sm text-gray-400 mt-1">Les avis positifs apparaîtront ici.</p>
              </div>
            `;
            return;
          }

          // Couleurs avatars (déterministe selon les initiales)
          var colors = [
            "bg-primary",
            "bg-purple-600",
            "bg-orange-500",
            "bg-blue-500",
            "bg-pink-500",
            "bg-teal-500",
          ];

          container.innerHTML = feedbacks
            .map(function (f, idx) {
              var stars = "";
              for (var i = 1; i <= 5; i++) {
                stars +=
                  '<span class="material-symbols-outlined text-[16px] ' +
                  (i <= f.rating ? "text-yellow-400" : "text-gray-200") +
                  '" style="font-variation-settings:\'FILL\' 1">star</span>';
              }
              var color = colors[idx % colors.length];
              var roleBadge = "";
              if (
                f.author_role === "organizer" ||
                f.author_role === "organisation"
              ) {
                roleBadge =
                  '<span class="ml-2 text-[10px] bg-primary/10 text-primary px-2 py-0.5 rounded-full font-bold uppercase">Organisateur</span>';
              } else if (f.author_role === "admin") {
                roleBadge =
                  '<span class="ml-2 text-[10px] bg-yellow-500/10 text-yellow-700 px-2 py-0.5 rounded-full font-bold uppercase">Équipe</span>';
              }
              return `
              <div class="bg-white rounded-2xl p-5 border border-gray-100 flex gap-4 shadow-sm hover:shadow-md transition-shadow">
                <div class="w-10 h-10 ${color} rounded-full flex items-center justify-center text-white font-bold text-sm shrink-0">
                  ${f.author_initials}
                </div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center flex-wrap">
                    <p class="font-bold text-gray-900 text-sm">${f.author_name}</p>
                    ${roleBadge}
                  </div>
                  <div class="flex text-yellow-400 my-1">${stars}</div>
                  <p class="text-sm text-gray-500 leading-relaxed">${escapeHtml(f.message)}</p>
                </div>
              </div>
            `;
            })
            .join("");
        } catch (error) {
          console.error("Erreur chargement avis:", error);
          container.innerHTML = `
            <div class="bg-white rounded-2xl p-5 border border-gray-100 text-center text-gray-400 text-sm">
              Impossible de charger les avis pour le moment.
            </div>
          `;
        }
      }

      function escapeHtml(text) {
        if (!text) return "";
        var div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Charger au démarrage
      loadCommunityFeedbacks();
    </script>
  </body>
</html>
